<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vérifier mon email — IS Beauty</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/laser-premium-v2.css">
  <style>
    .verify-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .verify-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      background: rgba(7, 11, 20, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(26, 236, 255, 0.08);
    }
    .verify-topbar a {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--color-muted);
      transition: var(--transition-fast);
      text-decoration: none;
    }
    .verify-topbar a:hover { color: var(--color-cyan); }
    .verify-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      position: relative;
      overflow: hidden;
    }
    .verify-main::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 40%, rgba(26, 236, 255, 0.07) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 60%, rgba(201, 174, 255, 0.05) 0%, transparent 40%);
      pointer-events: none;
    }
    .verify-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(26, 236, 255, 0.1);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .verify-icon {
      font-size: 2.5rem;
      margin-bottom: 1.25rem;
    }
    .verify-icon.loading { color: var(--color-cyan); }
    .verify-icon.success { color: #6FE3A0; }
    .verify-icon.error { color: #FF8B8B; }
    .verify-title {
      font-family: var(--font-heading, 'Outfit', sans-serif);
      font-size: 1.4rem;
      color: #fff;
      margin-bottom: 0.75rem;
    }
    .verify-text {
      color: var(--color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .verify-btn {
      display: inline-block;
      padding: 12px 28px;
      background: var(--color-cyan);
      color: #070B14;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition-fast);
    }
    .verify-btn:hover { opacity: 0.85; }
    .verify-btn.secondary {
      background: none;
      border: 1px solid rgba(26, 236, 255, 0.25);
      color: var(--color-cyan);
    }
    .verify-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .spin {
      animation: verify-spin 1s linear infinite;
    }
    @keyframes verify-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="verify-page">

  <div class="verify-topbar">
    <a href="/">
      <i class="fa-solid fa-arrow-left"></i>
      Retour au site
    </a>
  </div>

  <main class="verify-main">
    <div class="verify-card" id="verifyCard">
      <div class="verify-icon loading">
        <i class="fa-solid fa-circle-notch spin"></i>
      </div>
      <h1 class="verify-title">Vérification en cours…</h1>
      <p class="verify-text">Merci de patienter un instant.</p>
    </div>
  </main>

  <script>
    function renderState(icon, iconClass, title, text, actions) {
      const card = document.getElementById('verifyCard');
      card.innerHTML = `
        <div class="verify-icon ${iconClass}"><i class="fa-solid ${icon}"></i></div>
        <h1 class="verify-title">${title}</h1>
        <p class="verify-text">${text}</p>
        <div class="verify-actions">${actions || ''}</div>
      `;
    }

    async function verifyEmail() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        renderState(
          'fa-circle-exclamation',
          'error',
          'Lien invalide',
          'Ce lien de vérification est incomplet ou invalide.',
          '<a class="verify-btn" href="/">Retour à l\'accueil</a>'
        );
        return;
      }

      try {
        const response = await fetch('/api/auth/verify-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });

        const data = await response.json().catch(() => ({}));

        if (response.ok) {
          renderState(
            'fa-circle-check',
            'success',
            'Email vérifié',
            'Votre adresse email a bien été confirmée. Merci !',
            '<a class="verify-btn" href="/compte.html">Accéder à mon compte</a>'
          );
        } else if (response.status === 409) {
          renderState(
            'fa-circle-info',
            'error',
            'Déjà vérifié',
            'Cet email a déjà été confirmé précédemment. Aucune action supplémentaire n\'est nécessaire.',
            '<a class="verify-btn secondary" href="/compte.html">Accéder à mon compte</a>'
          );
        } else {
          renderState(
            'fa-circle-exclamation',
            'error',
            'Lien invalide ou expiré',
            data.message || 'Ce lien de vérification n\'est plus valide. Vous pouvez en demander un nouveau depuis votre espace client.',
            '<a class="verify-btn secondary" href="/compte.html">Accéder à mon compte</a>'
          );
        }
      } catch (error) {
        renderState(
          'fa-triangle-exclamation',
          'error',
          'Erreur de connexion',
          'Impossible de contacter le serveur pour le moment. Réessayez dans quelques instants.',
          '<a class="verify-btn secondary" href="/">Retour à l\'accueil</a>'
        );
      }
    }

    verifyEmail();
  </script>

</body>
</html>
