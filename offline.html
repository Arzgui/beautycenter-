<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IS Beauty — Hors ligne</title>
  <link rel="icon" href="assets/pwa-icon.svg" type="image/svg+xml">
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #111;
      color: #f8f8f8;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 4vw, 3rem);
    }
    p {
      max-width: 38rem;
      line-height: 1.7;
      color: #dcdcdc;
    }
    .badge {
      display: inline-flex;
      padding: 0.5rem 1rem;
      margin-top: 1.5rem;
      border-radius: 999px;
      background: #2e2e2e;
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div>
    <span class="badge">Mode hors ligne</span>
    <h1>Pas d’accès internet</h1>
    <p>IS Beauty est prêt à fonctionner comme une application mobile. Reconnectez-vous pour récupérer les rendez-vous et recevoir les dernières informations.</p>
  </div>
</body>
</html>
